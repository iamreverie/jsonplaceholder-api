version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - jp_network
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:1.25-alpine
    container_name: jp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jp_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: jp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3307:3306"
    volumes:
      - jp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jp_network

volumes:
  jp_db_data:

networks:
  jp_network:
    driver: bridge